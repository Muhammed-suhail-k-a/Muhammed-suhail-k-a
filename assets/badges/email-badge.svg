        stroke-linecap="round" stroke-dasharray="50 400" filter="url(#glowEM)">
    <animate attributeName="stroke-dashoffset" from="0" to="-450" dur="3s" repeatCount="indefinite"/>
  </rect>

  <rect x="10" y="9" width="38" height="38" rx="8" fill="#D14836"/>
  <path d="M14 20 L29 30 L44 20 L44 34 L14 34 Z" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>
