<svg width="200" height="56" viewBox="0 0 200 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGradEM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00eaff"/>
      <stop offset="50%" stop-color="#a259ff"/>
      <stop offset="100%" stop-color="#ff2ee6"/>
    </linearGradient>
    <filter id="glowEM" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="196" height="52" rx="26" fill="#0b0b12" stroke="#2a2a3a" stroke-width="1"/>
  <rect x="2" y="2" width="196" height="52" rx="26" fill="none" stroke="url(#neonGradEM)" stroke-width="1.5" opacity="0.35"/>

