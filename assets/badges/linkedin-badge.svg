<svg width="200" height="56" viewBox="0 0 200 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGradLI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00eaff"/>
      <stop offset="50%" stop-color="#a259ff"/>
      <stop offset="100%" stop-color="#ff2ee6"/>
    </linearGradient>
    <filter id="glowLI" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="196" height="52" rx="26" fill="#0b0b12" stroke="#2a2a3a" stroke-width="1"/>
  <rect x="2" y="2" width="196" height="52" rx="26" fill="none" stroke="url(#neonGradLI)" stroke-width="1.5" opacity="0.35"/>

  <rect x="2" y="2" width="196" height="52" rx="26" fill="none" stroke="url(#neonGradLI)" stroke-width="2.5"
        stroke-linecap="round" stroke-dasharray="50 400" filter="url(#glowLI)">
    <animate attributeName="stroke-dashoffset" from="0" to="-450" dur="3s" repeatCount="indefinite"/>
  </rect>

  <rect x="10" y="9" width="38" height="38" rx="8" fill="#0A66C2"/>
  <text x="29" y="35" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#ffffff" text-anchor="middle">in</text>

  <text x="60" y="34" font-family="Arial, sans-serif" font-weight="600" font-size="18" fill="#ffffff">LinkedIn</text>
</svg>
